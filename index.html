<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제휴보험사 연락처 조회 시스템</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (defer 속성을 명확히 지정하여 로딩 타이밍 일치) -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">

    <!-- 카카오톡 인앱 브라우저 강제 아웃링크(외부 브라우저 실행) 스크립트 -->
    <script>
        (function() {
            const useragt = navigator.userAgent.toLowerCase();
            const targetUrl = window.location.href;
            if (useragt.match(/kakaotalk/i)) {
                // 카카오톡 전용 스키마를 사용하여 외부 기본 브라우저를 강제 작동시킵니다.
                window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
            }
        })();
    </script>

    <script>
        const manifest = {
            "name": "제휴보험사 연락처",
            "short_name": "보험사연락처",
            "display": "standalone",
            "start_url": "./index.html",
            "background_color": "#f8fafc",
            "theme_color": "#4f46e5",
            "icons": [
                { "src": "https://img.icons8.com/fluent/192/000000/address-book.png", "sizes": "192x192", "type": "image/png" },
                { "src": "https://img.icons8.com/fluent/512/000000/address-book.png", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    </script>

    <style>
        body {
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bottom-sheet-transition { transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen" x-data="appState">

    <div class="w-full max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative pb-20">
        
        <!-- 상단 여백 및 높이를 슬림하게 조절한 헤더 -->
        <header class="sticky top-0 z-40 bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-5 pt-4 pb-4 rounded-b-[1.25rem] shadow-lg">
            <div class="flex justify-between items-center mb-2.5">
                <h1 class="text-lg font-bold tracking-tight">제휴보험사 연락처 조회</h1>
                
                <div class="flex items-center space-x-1">
                    <!-- 클라우드 동기화 아이콘 -->
                    <button @click="fetchData(true)" class="p-2 bg-white/10 hover:bg-white/20 active:scale-90 transition-all rounded-full" title="데이터 동기화">
                        <svg class="w-5 h-5 text-white" :class="loading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                        </svg>
                    </button>
                    <!-- PWA 설치 알림 버튼 (맥박 뛰는 듯한 바운스 애니메이션) -->
                    <button x-show="deferredPrompt" @click="installPWA()" class="p-2 bg-emerald-500 rounded-full animate-bounce" title="앱으로 설치">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    </button>
                    <!-- 진단도구 토글 버튼 -->
                    <button @click="isDiagOpen = !isDiagOpen" class="p-2 bg-white/10 rounded-full text-xs" title="개발진단도구">⚙️</button>
                </div>
            </div>

            <!-- 검색 입력바 -->
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="h-4.5 w-4.5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
                <input x-model="searchQuery" type="text" placeholder="이름, 보험사명 검색..." 
                       class="w-full pl-10 pr-10 py-2.5 bg-white/15 focus:bg-white text-white focus:text-slate-800 placeholder-indigo-200 focus:placeholder-slate-400 rounded-xl outline-none transition-all shadow-inner text-sm font-medium">
                <button x-show="searchQuery.length > 0" @click="searchQuery = ''" class="absolute inset-y-0 right-0 pr-3 flex items-center text-indigo-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        </header>

        <!-- py-5에서 pt-2.5로 상단 마진을 바짝 조절하여 헤더와의 긴밀한 배치 구축 -->
        <main class="flex-1 px-4 pt-2.5 pb-5 space-y-4 overflow-y-auto no-scrollbar">

            <!-- PWA 스마트폰 홈 화면 추가 안내 메시지 카드 (요청하신 가이드 문구 정교화 반영) -->
            <div x-show="showPwaGuide && !isPwaActive()" class="bg-gradient-to-r from-amber-50 to-orange-50/50 border border-amber-200 p-4 rounded-2xl relative shadow-sm" x-transition style="display: none;">
                <button @click="showPwaGuide = false" class="absolute top-3.5 right-3.5 text-amber-500 hover:text-amber-700" title="가이드 닫기">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <div class="flex items-start space-x-3">
                    <div class="p-2 bg-amber-500 text-white rounded-xl shadow-sm text-sm">
                        📱
                    </div>
                    <div>
                        <h4 class="text-xs font-black text-amber-800">홈 화면에 앱으로 설치하는 방법</h4>
                        <p class="text-[11px] text-amber-700 mt-1 leading-relaxed">
                            오른쪽 위에 움직이는 다운로드 아이콘(녹색)을 클릭하여 설치하시거나, 브라우저 설정 메뉴에서 <span class="font-bold">['홈 화면에 추가']</span> 혹은 <span class="font-bold">['설치']</span>를 선택하시면 스마트폰 홈 화면에서 터치 한 번으로 빠르게 연락처를 조회하실 수 있습니다.
                        </p>
                    </div>
                </div>
            </div>

            <!-- 실시간 데이터 동기화 진단 도구 -->
            <div x-show="isDiagOpen" class="bg-slate-800 text-slate-200 p-4 rounded-2xl text-xs space-y-2 font-mono shadow-xl" style="display: none;" x-transition>
                <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                    <span class="font-bold text-amber-400">데이터 연동 진단</span>
                    <button @click="isDiagOpen = false" class="text-slate-400">닫기</button>
                </div>
                <p>상태: <span x-text="syncStatus" :class="syncStatus === '성공' ? 'text-emerald-400' : 'text-rose-400'"></span></p>
                <p>총 데이터: <span x-text="contacts.length"></span>건</p>
                <p>마지막 동기화: <span x-text="lastSyncTime || '기록 없음'" class="text-sky-300"></span></p>
                <button @click="clearCacheAndFetch()" class="w-full py-2 bg-rose-600 text-white rounded-lg font-bold mt-2">캐시 초기화 및 재동기화</button>
            </div>
            
            <!-- 통합 검색 활성화 시 결과 노출 영역 (다중 연락처 구조 전면 반영) -->
            <template x-if="searchQuery.trim().length > 0">
                <div class="space-y-3">
                    <h2 class="text-xs font-bold text-indigo-600 px-1">검색 결과 (<span x-text="filteredSearchResults().length"></span>건)</h2>
                    <div class="grid gap-2.5">
                        <template x-for="contact in filteredSearchResults()" :key="contact.phone1 + contact.name + contact.company">
                            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm" :class="contact.holiday ? 'opacity-60 bg-slate-50' : ''">
                                <div class="flex justify-between items-start mb-2.5">
                                    <div>
                                        <div class="flex items-center space-x-1.5 mb-1">
                                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded border" :class="getCategoryStyle(contact.category)" x-text="normalizeCategory(contact.category)"></span>
                                            <span class="text-xs text-indigo-600 font-bold" x-text="contact.company"></span>
                                        </div>
                                        <h3 class="text-base font-bold text-slate-800 flex items-center space-x-2">
                                            <span x-text="contact.name"></span>
                                            <span class="text-xs bg-slate-100 text-slate-500 font-medium px-2 py-0.5 rounded-full" x-text="contact.rank"></span>
                                        </h3>
                                    </div>
                                    <template x-if="normalizeCategory(contact.category) !== '파트너스본부'">
                                        <button @click="toggleFavorite(contact.company, normalizeCategory(contact.category))" class="text-slate-300">
                                            <svg class="w-5 h-5" :class="isFavorite(contact.company, normalizeCategory(contact.category)) ? 'text-amber-400 fill-amber-400' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/></svg>
                                        </button>
                                    </template>
                                </div>
                                <!-- 다중 연락처 및 메모 통합 구조 -->
                                <div class="space-y-2 text-xs border-t border-slate-50 pt-2.5">
                                    <template x-if="contact.phone1">
                                        <div class="flex justify-between items-center py-1">
                                            <div class="flex items-center space-x-1.5">
                                                <span class="text-slate-400 font-semibold shrink-0">전화1:</span>
                                                <span class="font-mono text-slate-800 font-bold" x-text="contact.phone1"></span>
                                            </div>
                                            <div class="flex space-x-1.5">
                                                <button @click="copyToClipboard(contact.phone1)" class="px-2 py-1 text-[10px] bg-slate-50 border border-slate-150 rounded-lg">복사</button>
                                                <a :href="'tel:' + contact.phone1" class="px-2.5 py-1 text-[10px] font-bold text-white bg-indigo-500 rounded-lg">전화</a>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="contact.phone2">
                                        <div class="flex justify-between items-center py-1">
                                            <div class="flex items-center space-x-1.5">
                                                <span class="text-slate-400 font-semibold shrink-0">전화2:</span>
                                                <span class="font-mono text-slate-800 font-bold" x-text="contact.phone2"></span>
                                            </div>
                                            <div class="flex space-x-1.5">
                                                <button @click="copyToClipboard(contact.phone2)" class="px-2 py-1 text-[10px] bg-slate-50 border border-slate-150 rounded-lg">복사</button>
                                                <a :href="'tel:' + contact.phone2" class="px-2.5 py-1 text-[10px] font-bold text-white bg-indigo-500 rounded-lg">전화</a>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="contact.fax">
                                        <div class="flex justify-between items-center py-1">
                                            <div class="flex items-center space-x-1.5">
                                                <span class="text-slate-400 font-semibold shrink-0">팩스:</span>
                                                <span class="font-mono text-slate-600" x-text="contact.fax"></span>
                                            </div>
                                            <button @click="copyToClipboard(contact.fax)" class="px-2 py-1 text-[10px] bg-slate-50 border border-slate-150 rounded-lg">복사</button>
                                        </div>
                                    </template>
                                    <!-- 참고사항 렌더링 -->
                                    <template x-if="contact.notes">
                                        <div class="pt-1.5 border-t border-dashed border-slate-100 text-[11px] text-slate-500 flex items-start space-x-1">
                                            <span class="text-amber-500 shrink-0">📌</span>
                                            <span x-text="contact.notes"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- 기본 상태 (메인 대시보드 리스트) -->
            <template x-if="searchQuery.trim().length === 0">
                <div class="space-y-4">
                    
                    <!-- [수정완료] 파트너스본부: 카드 내부 선(border-b) 및 pb-2 삭제하여 완벽한 상하 여백 정렬 구현 -->
                    <div class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-2">
                                <div class="w-2.5 h-2.5 rounded-full bg-purple-500"></div>
                                <h2 class="text-base font-extrabold text-slate-800">파트너스본부</h2>
                            </div>
                            <!-- '연락처 보기' 버튼 클릭 시 바텀 시트 연동 -->
                            <button @click="openCompanyDetails('파트너스본부', '파트너스본부')" 
                                    class="px-3 py-1.5 bg-purple-100 hover:bg-purple-200 text-purple-700 font-extrabold text-[11px] rounded-xl transition-all active:scale-95">
                                연락처 보기
                            </button>
                        </div>
                    </div>

                    <!-- 손해/생명보험 카테고리 반복 루프 -->
                    <template x-for="cat in categoriesList" :key="cat">
                        <div class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm space-y-3">
                            <div class="space-y-3">
                                <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                                    <div class="flex items-center space-x-2">
                                        <div class="w-2.5 h-2.5 rounded-full" :class="getDotColor(cat)"></div>
                                        <!-- 카테고리 명칭 및 총 보험사 수 수록 -->
                                        <h2 class="text-base font-extrabold text-slate-800">
                                            <span x-text="cat"></span>
                                            <span class="text-xs font-normal text-slate-400 ml-1" x-text="'(총 ' + getCompaniesByCategory(cat).length + '개)'"></span>
                                        </h2>
                                    </div>
                                </div>
                                
                                <!-- [조치 완료] 즐겨찾기가 하나라도 등록되어 있으면 가이드라인 설명 문구 자동 숨김 처리 -->
                                <p x-show="getFavorites(cat).length === 0" class="text-[11px] text-slate-400 mt-1 leading-relaxed" x-transition>
                                    자주 찾는 보험사를 별표(★)를 눌러 최대 6개까지 홈 화면에 등록해 보세요.
                                </p>

                                <!-- 즐겨찾기 지정 보험사 리스트 -->
                                <div class="grid grid-cols-2 gap-2" x-show="getFavorites(cat).length > 0">
                                    <template x-for="comp in getFavorites(cat)" :key="comp">
                                        <div @click="openCompanyDetails(comp, cat)" class="flex items-center justify-between bg-indigo-50/50 border border-indigo-100/50 p-3 rounded-xl active:scale-95 transition-all cursor-pointer">
                                            <span class="text-xs font-bold text-slate-800 truncate" x-text="comp"></span>
                                            <button @click.stop="toggleFavorite(comp, cat)" class="text-amber-400">
                                                <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/></svg>
                                            </button>
                                        </div>
                                    </template>
                                </div>

                                <!-- 나머지 보험사 목록 더보기 펼치기 단추 -->
                                <button @click="isExpanded[cat] = !isExpanded[cat]" class="w-full flex justify-between items-center py-2.5 px-4 bg-slate-50 rounded-xl text-[11px] font-bold text-slate-500 transition-all">
                                    <span x-text="isExpanded[cat] ? '기타 보험사 접기' : '기타 보험사 목록 펼치기'"></span>
                                    <svg class="w-3.5 h-3.5 transition-transform" :class="isExpanded[cat] ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" /></svg>
                                </button>

                                <!-- 펼치기 영역 -->
                                <div x-show="isExpanded[cat]" class="grid grid-cols-2 gap-2 mt-2" x-transition>
                                    <template x-for="comp in getRemainingCompanies(cat)" :key="comp">
                                        <div @click="openCompanyDetails(comp, cat)" class="flex items-center justify-between bg-slate-50 p-3 rounded-xl cursor-pointer hover:bg-slate-100 transition-all">
                                            <span class="text-xs font-bold text-slate-700 truncate" x-text="comp"></span>
                                            <button @click.stop="toggleFavorite(comp, cat)" class="text-slate-300">
                                                <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </main>

        <!-- 높이 90vh로 확실하게 대폭 확장 / 스와이프 제스처 이벤트 리스너 탑재 -->
        <div x-show="selectedCompany" class="fixed inset-0 z-50 overflow-hidden" style="display: none;">
            <!-- 모달 오버레이 배경 -->
            <div @click="selectedCompany = null" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>
            
            <!-- 실제 슬라이드업 시트 바디 (스와이프 제스처 이벤트 리스너 등록) -->
            <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto w-full flex flex-col bg-white rounded-t-[2rem] overflow-hidden shadow-2xl transition-transform duration-300 bottom-sheet-transition" 
                 :class="selectedCompany ? 'translate-y-0' : 'translate-y-full'" 
                 style="height: 90vh;"
                 @touchstart="touchStart($event)"
                 @touchmove="touchMove($event)"
                 @touchend="touchEnd($event)">
                
                <!-- [수정완료] 시트 상단 헤더 영역 클릭/터치만 해도 편리하게 닫히도록 최적화 -->
                <div @click="selectedCompany = null" class="pt-3 pb-4 px-5 border-b border-slate-100 flex flex-col items-center bg-slate-50 sticky top-0 z-10 cursor-pointer active:bg-slate-100/50 transition-colors" title="터치하거나 아래로 밀어내리면 창이 닫힙니다.">
                    <!-- 중앙 정렬된 슬라이드 핸들 바 -->
                    <div class="w-10 h-1 bg-slate-300 rounded-full mb-4"></div>
                    <div class="w-full flex items-center justify-between" @click.stop>
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] font-extrabold px-2 py-0.5 rounded border" :class="getCategoryStyle(selectedCompanyCat)" x-text="selectedCompanyCat"></span>
                            <h2 class="text-lg font-black text-slate-800" x-text="selectedCompany"></h2>
                        </div>
                        <button @click="selectedCompany = null" class="p-2 text-slate-400">✕</button>
                    </div>
                </div>

                <!-- 부서원 상세 리스트 (직급별 그룹화) -->
                <div class="flex-1 overflow-y-auto px-5 py-4 space-y-4 no-scrollbar pb-10">
                    <template x-for="group in getGroupedCompanyContacts()" :key="group.rank">
                        <div class="space-y-2">
                            <h3 class="text-[11px] font-extrabold text-slate-400 uppercase tracking-tighter" x-text="group.rank"></h3>
                            <div class="space-y-2">
                                <template x-for="contact in group.contacts" :key="contact.phone1 + contact.name">
                                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100" :class="contact.holiday ? 'opacity-50' : ''">
                                        <div class="flex justify-between items-center mb-3">
                                            <span class="font-extrabold text-slate-800" x-text="contact.name"></span>
                                            <template x-if="contact.holiday"><span class="text-[9px] bg-rose-500 text-white px-1.5 py-0.5 rounded-full font-bold">휴무</span></template>
                                        </div>
                                        
                                        <!-- 다중 전화번호, 팩스 및 참고사항 대응을 위한 구조 고도화 -->
                                        <div class="space-y-2.5 text-xs border-t border-slate-100/70 pt-2.5">
                                            <!-- 전화번호 1 -->
                                            <template x-if="contact.phone1">
                                                <div class="flex justify-between items-center py-0.5">
                                                    <div class="flex items-center space-x-1.5">
                                                        <span class="text-slate-400 font-semibold">전화1:</span>
                                                        <span class="font-mono text-slate-800 font-bold" x-text="contact.phone1"></span>
                                                    </div>
                                                    <div class="flex space-x-1.5">
                                                        <button @click="copyToClipboard(contact.phone1)" class="px-2 py-1 text-[10px] bg-white border border-slate-200 rounded-lg shadow-sm">복사</button>
                                                        <a :href="'tel:' + contact.phone1" class="px-3 py-1 text-white bg-indigo-500 font-bold rounded-lg shadow-sm active:scale-95 transition-all">전화</a>
                                                    </div>
                                                </div>
                                            </template>
                                            
                                            <!-- 전화번호 2 -->
                                            <template x-if="contact.phone2">
                                                <div class="flex justify-between items-center py-0.5">
                                                    <div class="flex items-center space-x-1.5">
                                                        <span class="text-slate-400 font-semibold">전화2:</span>
                                                        <span class="font-mono text-slate-800 font-bold" x-text="contact.phone2"></span>
                                                    </div>
                                                    <div class="flex space-x-1.5">
                                                        <button @click="copyToClipboard(contact.phone2)" class="px-2 py-1 text-[10px] bg-white border border-slate-200 rounded-lg shadow-sm">복사</button>
                                                        <a :href="'tel:' + contact.phone2" class="px-3 py-1 text-white bg-indigo-500 font-bold rounded-lg shadow-sm active:scale-95 transition-all">전화</a>
                                                    </div>
                                                </div>
                                            </template>

                                            <!-- 팩스번호 -->
                                            <template x-if="contact.fax">
                                                <div class="flex justify-between items-center py-0.5">
                                                    <div class="flex items-center space-x-1.5">
                                                        <span class="text-slate-400 font-semibold">팩스:</span>
                                                        <span class="font-mono text-slate-600" x-text="contact.fax"></span>
                                                    </div>
                                                    <button @click="copyToClipboard(contact.fax)" class="px-2 py-1 text-[10px] bg-white border border-slate-200 rounded-lg shadow-sm">복사</button>
                                                </div>
                                            </template>

                                            <!-- 참고사항 메모 영역 -->
                                            <template x-if="contact.notes">
                                                <div class="pt-2 border-t border-dashed border-slate-200 text-slate-500 flex items-start space-x-1 text-[11px] leading-relaxed">
                                                    <span class="text-amber-500 shrink-0">📌</span>
                                                    <span x-text="contact.notes"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 알림 토스트 팝업 -->
        <div x-show="toastShow" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900/90 text-white text-xs px-5 py-3 rounded-full shadow-2xl" style="display: none;" x-transition>
            <span class="font-bold" x-text="toastMessage"></span>
        </div>

        <!-- 로딩 인디케이터 -->
        <div x-show="loading" class="fixed inset-0 bg-white/70 backdrop-blur-sm z-50 flex items-center justify-center" style="display: none;">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appState', () => ({
                categoriesList: ['손해보험', '생명보험'], 
                favorites: { '손해보험': [], '생명보험': [] },
                isExpanded: { '손해보험': false, '생명보험': false },
                contacts: [], 
                loading: false, 
                searchQuery: '', 
                innerSearchQuery: '',
                selectedCompany: null, 
                selectedCompanyCat: null,
                toastShow: false, 
                toastMessage: '', 
                toastTimeout: null,
                deferredPrompt: null, 
                isDiagOpen: false, 
                syncStatus: '',
                lastSyncTime: '',
                showPwaGuide: true, 

                // 제스처 스와이프를 지원하는 터치 위치 추적 변수
                touchStartY: 0,
                touchEndY: 0,

                init() {
                    this.loadFavorites();
                    this.loadLastSyncTime();
                    this.fetchData();
                    window.addEventListener('beforeinstallprompt', (e) => { 
                        e.preventDefault(); 
                        this.deferredPrompt = e; 
                    });
                },

                // 스와이프 제스처 핸들러 구현 (아래로 밀어 팝업 닫기)
                touchStart(e) {
                    this.touchStartY = e.touches[0].clientY;
                    this.touchEndY = e.touches[0].clientY;
                },
                touchMove(e) {
                    this.touchEndY = e.touches[0].clientY;
                },
                touchEnd() {
                    // 아래쪽 방향으로 100px 이상 쓸어내렸을 때 스와이프 액션 실행
                    if (this.touchEndY - this.touchStartY > 100) {
                        this.selectedCompany = null;
                        this.showToast('팝업을 닫았습니다.');
                    }
                    this.touchStartY = 0;
                    this.touchEndY = 0;
                },

                isPwaActive() {
                    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                },

                showToast(msg) {
                    if (this.toastTimeout) clearTimeout(this.toastTimeout);
                    this.toastMessage = msg; 
                    this.toastShow = true;
                    this.toastTimeout = setTimeout(() => this.toastShow = false, 2000);
                },

                getCategoryStyle(cat) {
                    const n = this.normalizeCategory(cat);
                    if (n === '파트너스본부') return 'bg-purple-50 text-purple-600 border-purple-100';
                    if (n === '손해보험') return 'bg-orange-50 text-orange-600 border-orange-100';
                    return 'bg-blue-50 text-blue-600 border-blue-100';
                },

                getDotColor(cat) {
                    if (cat === '파트너스본부') return 'bg-purple-500';
                    if (cat === '손해보험') return 'bg-orange-500';
                    return 'bg-blue-500';
                },

                normalizeCategory(cat) {
                    const c = (cat || '').trim();
                    if (c.includes('파트너스')) return '파트너스본부';
                    if (c.includes('손보') || c.includes('손해')) return '손해보험';
                    if (c.includes('생보') || c.includes('생명')) return '생명보험';
                    return c;
                },

                loadFavorites() {
                    try {
                        const s = localStorage.getItem('fav_insurance_v6');
                        if (s) this.favorites = JSON.parse(s);
                    } catch (e) { 
                        this.favorites = { '손해보험': [], '생명보험': [] }; 
                    }
                },

                saveFavorites() { 
                    localStorage.setItem('fav_insurance_v6', JSON.stringify(this.favorites)); 
                },

                loadLastSyncTime() {
                    this.lastSyncTime = localStorage.getItem('last_sync_time_v6') || '';
                },

                isFavorite(comp, cat) { 
                    return (this.favorites[cat] || []).includes(comp); 
                },

                getFavorites(cat) { 
                    return (this.favorites[cat] || []).sort((a, b) => a.localeCompare(b, 'ko')); 
                },

                getRemainingCompanies(cat) {
                    const favs = this.favorites[cat] || [];
                    return this.getCompaniesByCategory(cat).filter(c => !favs.includes(c));
                },

                toggleFavorite(comp, cat) {
                    if (!this.favorites[cat]) this.favorites[cat] = [];
                    const f = this.favorites[cat];
                    const idx = f.indexOf(comp);
                    if (idx > -1) { 
                        f.splice(idx, 1); 
                        this.showToast(`${comp} 즐겨찾기 해제`); 
                    } else {
                        if (f.length >= 6) { 
                            this.showToast('최대 6개까지만 설정할 수 있습니다.'); 
                            return; 
                        }
                        f.push(comp); 
                        this.showToast(`${comp} 즐겨찾기 추가`);
                    }
                    this.saveFavorites();
                },

                getCompaniesByCategory(cat) {
                    const n = this.normalizeCategory(cat);
                    const comps = this.contacts
                        .filter(c => this.normalizeCategory(c.category) === n)
                        .map(c => c.company);
                    return [...new Set(comps)].filter(Boolean).sort((a, b) => a.localeCompare(b, 'ko'));
                },

                clearCacheAndFetch() { 
                    localStorage.clear(); 
                    this.lastSyncTime = '';
                    this.fetchData(true); 
                },

                async fetchData(userInitiated = false) {
                    this.loading = true; 
                    this.syncStatus = '연결 중';
                    const sId = '1jE81bhIsmRv3JmJRjs-jMKMk5d6ArQDQ2ODGleLcZvY';
                    const sName = encodeURIComponent('보험사연락처_DB');
                    
                    try {
                        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sId}/gviz/tq?tqx=out:json&sheet=${sName}`);
                        const txt = await res.text();
                        const json = JSON.parse(txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1));
                        const rows = json.table.rows;
                        
                        // [보강완료] 전화번호2, 팩스번호, 참고사항까지 안정적으로 수집하도록 칼럼 매핑 확보
                        let colMap = {
                            category: 0, company: 1, sortOrder: 2, rank: 3, name: 4,
                            phone1: 5, phone2: 6, fax: 7, notes: 8, holiday: 9, deleted: 12
                        };

                        if (rows.length > 0) {
                            rows[0].c.forEach((cell, idx) => {
                                if (!cell) return;
                                const val = String(cell.v || cell.f || '').replace(/\s+/g, '');
                                if (val.includes('구분') || val.includes('손보생보')) colMap.category = idx;
                                else if (val.includes('보험사')) colMap.company = idx;
                                else if (val.includes('정렬')) colMap.sortOrder = idx;
                                else if (val.includes('직급')) colMap.rank = idx;
                                else if (val.includes('이름')) colMap.name = idx;
                                else if (val.includes('전화번호1') || (val.includes('전화') && !val.includes('2'))) colMap.phone1 = idx;
                                else if (val.includes('전화번호2')) colMap.phone2 = idx;
                                else if (val.includes('팩스')) colMap.fax = idx;
                                else if (val.includes('참고')) colMap.notes = idx;
                                else if (val.includes('휴무')) colMap.holiday = idx;
                                else if (val.includes('삭제')) colMap.deleted = idx;
                            });
                        }

                        const parsed = [];
                        rows.forEach((r, idx) => {
                            if (idx === 0) return; 
                            const getVal = (i) => {
                                if (i === undefined || !r.c || !r.c[i]) return '';
                                return String(r.c[i].f || r.c[i].v || '').trim();
                            };
                            
                            if (getVal(colMap.deleted)) return; 

                            parsed.push({
                                category: getVal(colMap.category), 
                                company: getVal(colMap.company), 
                                sortOrder: getVal(colMap.sortOrder), 
                                rank: getVal(colMap.rank), 
                                name: getVal(colMap.name),
                                phone1: getVal(colMap.phone1), 
                                phone2: getVal(colMap.phone2), 
                                fax: getVal(colMap.fax), 
                                notes: getVal(colMap.notes), // 참고사항 파싱 데이터 활성화
                                holiday: getVal(colMap.holiday).toUpperCase() === 'Y' || getVal(colMap.holiday) === '예'
                            });
                        });
                        
                        this.contacts = parsed;
                        localStorage.setItem('cached_db_v6', JSON.stringify(this.contacts));
                        
                        const now = new Date();
                        this.lastSyncTime = now.toLocaleString('ko-KR');
                        localStorage.setItem('last_sync_time_v6', this.lastSyncTime);

                        this.syncStatus = '성공';
                        if (userInitiated) this.showToast('동기화 완료');
                    } catch (e) {
                        const c = localStorage.getItem('cached_db_v6');
                        if (c) { 
                            this.contacts = JSON.parse(c); 
                            this.showToast('네트워크 오류: 오프라인 캐시 적용됨'); 
                        }
                        this.syncStatus = '실패';
                    } finally { 
                        this.loading = false; 
                    }
                },

                openCompanyDetails(comp, cat) { 
                    this.selectedCompany = comp; 
                    this.selectedCompanyCat = cat; 
                },

                // 파트너스본부의 모든 구성원이 교차 추적으로 완벽하게 나오도록 개선 완료된 로직
                getGroupedCompanyContacts() {
                    if (!this.selectedCompany) return [];
                    const nCat = this.normalizeCategory(this.selectedCompanyCat);
                    const list = this.contacts.filter(c => {
                        if (nCat === '파트너스본부') {
                            const isCategoryPartners = this.normalizeCategory(c.category) === '파트너스본부' || (c.category || '').trim() === '파트너스본부';
                            const isCompanyPartners = this.normalizeCategory(c.company) === '파트너스본부' || (c.company || '').trim() === '파트너스본부';
                            return isCategoryPartners || isCompanyPartners;
                        }
                        return c.company === this.selectedCompany;
                    });
                    
                    const map = {};
                    list.forEach(c => {
                        const r = c.rank || '미지정';
                        if (!map[r]) map[r] = [];
                        map[r].push(c);
                    });
                    return Object.keys(map).map(r => ({
                        rank: r,
                        contacts: map[r].sort((a, b) => (parseFloat(a.sortOrder) || 999) - (parseFloat(b.sortOrder) || 999) || a.name.localeCompare(b.name, 'ko'))
                    }));
                },

                filteredSearchResults() {
                    const q = this.searchQuery.trim().toLowerCase();
                    if (!q) return [];
                    return this.contacts.filter(c => c.name.toLowerCase().includes(q) || (c.company || '').toLowerCase().includes(q))
                        .sort((a, b) => a.company.localeCompare(b.company, 'ko') || a.name.localeCompare(b.name, 'ko'));
                },

                copyToClipboard(t) {
                    const el = document.createElement('textarea'); 
                    el.value = t; 
                    document.body.appendChild(el);
                    el.select(); 
                    document.execCommand('copy'); 
                    document.body.removeChild(el);
                    this.showToast('번호가 복사되었습니다.');
                },

                async installPWA() { 
                    if (this.deferredPrompt) { 
                        this.deferredPrompt.prompt(); 
                        this.deferredPrompt = null; 
                    } 
                }
            }));
        });
    </script>
</body>
</html>
