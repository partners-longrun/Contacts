<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>제휴보험사 연락처 조회 시스템</title>
    
    <!-- Tailwind CSS (고급 스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (반응형 상태 관리) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Pretendard 폰트 불러오기 (가독성 극대화) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <!-- PWA 모바일 앱 지원 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">

    <script>
        // 깃허브 배포를 고려하여 절대 경로가 아닌 상대 경로 기반의 Manifest 설정
        const manifest = {
            "name": "제휴보험사 연락처",
            "short_name": "보험사연락처",
            "description": "손해/생명보험사 파트너 연락처 통합 조회 시스템",
            "start_url": "./index.html",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#4f46e5",
            "icons": [
                {
                    "src": "https://img.icons8.com/fluent/192/000000/address-book.png",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "https://img.icons8.com/fluent/512/000000/address-book.png",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const manifestStr = JSON.stringify(manifest);
        const blob = new Blob([manifestStr], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    </script>

    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* 모바일 스크롤 바 숨김 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 바텀 시트 애니메이션 */
        .bottom-sheet-transition {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col justify-between" x-data="appState()">

    <div class="w-full max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative pb-20">
        
        <!-- 상단 헤더 영역 -->
        <header class="sticky top-0 z-40 bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-5 pt-7 pb-6 rounded-b-[2rem] shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="text-[10px] bg-white/20 text-indigo-100 font-bold px-2 py-0.5 rounded-full border border-white/10 uppercase tracking-wider">PWA Partner App</span>
                    <h1 class="text-xl font-bold mt-1 tracking-tight">제휴보험사 연락처 조회</h1>
                </div>
                <!-- 우측 제어 아이콘 (동기화, PWA 설치) -->
                <div class="flex items-center space-x-1.5">
                    <button @click="fetchData(true)" class="p-2.5 bg-white/10 hover:bg-white/20 active:scale-95 transition-all rounded-full" title="동기화">
                        <svg class="w-5 h-5 text-white" :class="loading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.753 8H17" />
                        </svg>
                    </button>
                    <button x-show="deferredPrompt" @click="installPWA()" class="p-2.5 bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all rounded-full animate-pulse" title="앱으로 다운로드">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <!-- 개발자 진단 도구 -->
                    <button @click="isDiagOpen = !isDiagOpen" class="p-2.5 bg-white/10 hover:bg-white/20 active:scale-95 transition-all rounded-full text-xs font-semibold" title="진단">
                        📋
                    </button>
                </div>
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </span>
                <input x-model="searchQuery" type="text" placeholder="이름, 직급, 전화번호, 보험사명 검색..." 
                       class="w-full pl-10 pr-10 py-3 bg-white/15 focus:bg-white text-white focus:text-slate-800 placeholder-indigo-200 focus:placeholder-slate-400 rounded-2xl outline-none border border-transparent focus:border-indigo-400 transition-all shadow-inner text-sm font-medium">
                <!-- 검색어 지우기 버튼 -->
                <button x-show="searchQuery.length > 0" @click="searchQuery = ''" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-indigo-200 hover:text-white focus:text-indigo-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1 px-4 py-5 space-y-6 overflow-y-auto no-scrollbar">

            <div x-show="isDiagOpen" class="bg-slate-800 text-slate-200 p-4 rounded-2xl text-xs space-y-2 font-mono">
                <div class="flex justify-between items-center border-b border-slate-700 pb-1.5">
                    <span class="font-bold text-amber-400">구글 시트 수신 진단 정보</span>
                    <button @click="isDiagOpen = false" class="text-slate-400 hover:text-white">닫기</button>
                </div>
                <p>동기화 상태: <span x-text="syncStatus"></span></p>
                <p>총 데이터 행 수: <span x-text="contacts.length"></span>건</p>
                <p>마지막 동기화: <span x-text="lastSyncStr"></span></p>
                <button @click="clearCacheAndFetch()" class="w-full py-1.5 bg-red-600 hover:bg-red-700 text-white rounded font-bold transition-all mt-2 text-center block">
                    캐시 삭제 후 강제 재동기화
                </button>
            </div>
            
            <template x-if="searchQuery.trim().length > 0">
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h2 class="text-sm font-bold text-indigo-600">통합 검색결과 (<span x-text="filteredSearchResults().length"></span>건)</h2>
                        <button @click="searchQuery = ''" class="text-xs text-slate-400 hover:text-slate-600 underline">검색 초기화</button>
                    </div>

                    <!-- 검색 카드 목록 -->
                    <div class="grid gap-3">
                        <template x-for="contact in filteredSearchResults()" :key="contact.phone1 + contact.name + contact.company">
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm transition-all hover:border-indigo-100" :class="contact.holiday ? 'opacity-60 bg-slate-50' : ''">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <div class="flex items-center space-x-1.5">
                                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded" :class="contact.category === '손보' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-blue-50 text-blue-600 border border-blue-100'" x-text="contact.category === '손보' ? '손해' : '생명'"></span>
                                            <span class="text-xs text-indigo-600 font-bold" x-text="contact.company"></span>
                                        </div>
                                        <h3 class="text-base font-bold text-slate-800 mt-1 flex items-center space-x-2">
                                            <span x-text="contact.name"></span>
                                            <span class="text-xs bg-slate-100 text-slate-500 font-medium px-2 py-0.5 rounded-full" x-text="contact.rank"></span>
                                            <template x-if="contact.holiday">
                                                <span class="text-[10px] bg-rose-500 text-white font-medium px-1.5 py-0.5 rounded-full">휴무</span>
                                            </template>
                                        </h3>
                                    </div>
                                    <button @click="toggleFavorite(contact.company, contact.category)" class="p-1 rounded-full text-slate-300 hover:text-amber-400">
                                        <svg class="w-5 h-5" :class="isFavorite(contact.company, contact.category) ? 'text-amber-400 fill-amber-400' : 'text-slate-300'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/>
                                        </svg>
                                    </button>
                                </div>
                                
                                <!-- 연락처 상세 조작 -->
                                <div class="space-y-2 mt-3 text-sm">
                                    <template x-if="contact.phone1">
                                        <div class="flex items-center justify-between py-1.5 border-b border-dashed border-slate-100">
                                            <div class="flex items-center space-x-2">
                                                <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">번호1</span>
                                                <span class="font-mono text-slate-700 font-bold select-all" x-text="contact.phone1"></span>
                                            </div>
                                            <div class="flex space-x-1.5">
                                                <button @click="copyToClipboard(contact.phone1)" class="px-2.5 py-1 text-xs text-slate-600 font-medium hover:text-indigo-600 bg-slate-100 active:bg-slate-200 rounded-lg active:scale-95 transition-all">복사</button>
                                                <a :href="'tel:' + contact.phone1" class="px-3 py-1 text-xs font-bold text-white bg-indigo-500 hover:bg-indigo-600 rounded-lg active:scale-95 transition-all flex items-center shadow-sm">전화</a>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="contact.phone2">
                                        <div class="flex items-center justify-between py-1.5 border-b border-dashed border-slate-100">
                                            <div class="flex items-center space-x-2">
                                                <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">번호2</span>
                                                <span class="font-mono text-slate-700 font-bold select-all" x-text="contact.phone2"></span>
                                            </div>
                                            <div class="flex space-x-1.5">
                                                <button @click="copyToClipboard(contact.phone2)" class="px-2.5 py-1 text-xs text-slate-600 font-medium hover:text-indigo-600 bg-slate-100 active:bg-slate-200 rounded-lg active:scale-95 transition-all">복사</button>
                                                <a :href="'tel:' + contact.phone2" class="px-3 py-1 text-xs font-bold text-white bg-indigo-500 hover:bg-indigo-600 rounded-lg active:scale-95 transition-all flex items-center shadow-sm">전화</a>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="contact.fax">
                                        <div class="flex items-center justify-between py-1.5">
                                            <div class="flex items-center space-x-2">
                                                <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded border border-amber-100">팩스</span>
                                                <span class="font-mono text-slate-600 select-all" x-text="contact.fax"></span>
                                            </div>
                                            <button @click="copyToClipboard(contact.fax)" class="px-2.5 py-1 text-xs text-slate-600 font-medium hover:text-amber-700 bg-slate-100 rounded-lg active:scale-95 transition-all">복사</button>
                                        </div>
                                    </template>
                                    <template x-if="contact.note">
                                        <div class="mt-2 bg-indigo-50/50 p-2.5 rounded-xl text-xs text-slate-600 border border-indigo-100/50">
                                            <span class="font-bold block mb-0.5 text-indigo-600">참고사항</span>
                                            <span x-text="contact.note"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="searchQuery.trim().length === 0">
                <div class="space-y-6">
                    
                    <!-- 1. 손해보험 부문 -->
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div class="flex justify-between items-center pb-2 border-b border-slate-100">
                            <div class="flex items-center space-x-2">
                                <div class="w-2.5 h-2.5 bg-orange-500 rounded-full animate-pulse"></div>
                                <h2 class="text-base font-extrabold text-slate-800">손해보험 <span class="text-xs text-slate-400 font-normal" x-text="`(${nonLifeCompanies.length}개사)`"></span></h2>
                            </div>
                            <span class="text-[10px] text-indigo-600 font-bold px-2.5 py-0.5 bg-indigo-50 rounded-full border border-indigo-100">즐겨찾기 최대 4개</span>
                        </div>

                        <!-- 즐겨찾는 손보 리스트 -->
                        <div>
                            <span class="text-[11px] font-bold text-indigo-500 block mb-2">★ 자주 찾는 손해보험사</span>
                            <div class="grid grid-cols-2 gap-2">
                                <template x-for="comp in getFavorites('손보')" :key="comp">
                                    <div class="relative flex items-center justify-between bg-gradient-to-br from-indigo-50 to-indigo-50/30 border border-indigo-100/40 p-3 rounded-2xl shadow-sm hover:border-indigo-300 transition-all cursor-pointer active:scale-95" @click="openCompanyDetails(comp, '손보')">
                                        <div class="flex items-center space-x-1.5 overflow-hidden">
                                            <span class="text-amber-400 text-sm shrink-0">★</span>
                                            <span class="text-sm font-extrabold text-slate-800 truncate" x-text="comp"></span>
                                        </div>
                                        <button @click.stop="toggleFavorite(comp, '손보')" class="p-1 text-amber-400 hover:scale-115 transition-transform shrink-0">
                                            <svg class="w-4 h-4 fill-amber-400" stroke="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/></svg>
                                        </button>
                                    </div>
                                </template>
                                <template x-if="getFavorites('손보').length === 0">
                                    <div class="col-span-2 text-center py-4 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                        <span class="text-[11px] text-slate-400">자주 조회하는 보험사에 별표(★)를 눌러보세요.</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- 더보기 아코디언 버튼 -->
                        <div class="pt-1">
                            <button @click="isNonLifeExpanded = !isNonLifeExpanded" class="w-full flex items-center justify-between py-3 px-4 bg-slate-50 hover:bg-slate-100 active:scale-[0.99] transition-all rounded-xl text-xs font-bold text-slate-600 border border-slate-100">
                                <span x-text="isNonLifeExpanded ? '손해보험사 목록 접기' : '전체 손해보험사 펼치기'"></span>
                                <svg class="w-4 h-4 transform transition-transform duration-300 text-slate-400" :class="isNonLifeExpanded ? 'rotate-180 text-indigo-600' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>

                            <!-- 접혀있는 손해보험 리스트 -->
                            <div x-show="isNonLifeExpanded" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 max-h-0" x-transition:enter-end="opacity-100 max-h-[800px]" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 max-h-[800px]" x-transition:leave-end="opacity-0 max-h-0" class="overflow-hidden mt-2 grid grid-cols-2 gap-2">
                                <template x-for="comp in getRemainingCompanies('손보')" :key="comp">
                                    <div class="flex items-center justify-between bg-slate-50/70 hover:bg-indigo-50/30 border border-slate-200/60 p-3 rounded-2xl cursor-pointer hover:border-indigo-100 transition-all active:scale-95" @click="openCompanyDetails(comp, '손보')">
                                        <span class="text-xs font-bold text-slate-700 truncate" x-text="comp"></span>
                                        <button @click.stop="toggleFavorite(comp, '손보')" class="p-1 text-slate-300 hover:text-amber-400 transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/></svg>
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div class="flex justify-between items-center pb-2 border-b border-slate-100">
                            <div class="flex items-center space-x-2">
                                <div class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse"></div>
                                <h2 class="text-base font-extrabold text-slate-800">생명보험 <span class="text-xs text-slate-400 font-normal" x-text="`(${lifeCompanies.length}개사)`"></span></h2>
                            </div>
                            <span class="text-[10px] text-indigo-600 font-bold px-2.5 py-0.5 bg-indigo-50 rounded-full border border-indigo-100">즐겨찾기 최대 4개</span>
                        </div>

                        <!-- 즐겨찾는 생보 리스트 -->
                        <div>
                            <span class="text-[11px] font-bold text-indigo-500 block mb-2">★ 자주 찾는 생명보험사</span>
                            <div class="grid grid-cols-2 gap-2">
                                <template x-for="comp in getFavorites('생보')" :key="comp">
                                    <div class="relative flex items-center justify-between bg-gradient-to-br from-indigo-50 to-indigo-50/30 border border-indigo-100/40 p-3 rounded-2xl shadow-sm hover:border-indigo-300 transition-all cursor-pointer active:scale-95" @click="openCompanyDetails(comp, '생보')">
                                        <div class="flex items-center space-x-1.5 overflow-hidden">
                                            <span class="text-amber-400 text-sm shrink-0">★</span>
                                            <span class="text-sm font-extrabold text-slate-800 truncate" x-text="comp"></span>
                                        </div>
                                        <button @click.stop="toggleFavorite(comp, '생보')" class="p-1 text-amber-400 hover:scale-115 transition-transform shrink-0">
                                            <svg class="w-4 h-4 fill-amber-400" stroke="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.36 1.252.583 1.828l-3.9 2.834a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.9-2.834a1 1 0 00-1.175 0l-3.9 2.834c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118l-3.9-2.834c-.778-.577-.378-1.828.583-1.828h4.906a1 1 0 00.95-.69l1.519-4.674z"/></svg>
                                        </button>
                                    </div>
                                </template>

    <script>
        function appState() {
            return {
                // 한글 가나다순으로 자동 정렬된 기본 보험사 리스트
                nonLifeCompanies: ['AIG손보', 'DB손보', 'KB손보', '농협손보', '롯데손보', '메리츠화재', '삼성화재', '하나손보', '한화손보', '현대해상', '흥국화재'].sort((a, b) => a.localeCompare(b, 'ko')),
                lifeCompanies: ['ABL생명', 'DB생명', 'IBK연금', 'KB라이프', 'KDB생명', '교보생명', '농협생명', '동양생명', '라이나생명', '메트라이프', '미래에셋생명', '삼성생명', '신한라이프', '카디프생명', '하나생명', '흥국생명', '한화생명'].sort((a, b) => a.localeCompare(b, 'ko')),
                
                // 즐겨찾기 상태 목록
                favoritesNonLife: [],
                favoritesLife: [],
                isNonLifeExpanded: false,
                isLifeExpanded: false,
                
                // 수신 원본 연락처 DB
                contacts: [],
                loading: false,
                searchQuery: '',
                innerSearchQuery: '',
                
                // 바텀 시트 연동 상태
                selectedCompany: null,
                selectedCompanyCat: null,
                
                // 알림 토스트 상태
                toastShow: false,
                toastMessage: '',
                toastTimeout: null,

                // PWA 강제 설치 트리거
                deferredPrompt: null,

                // 진단 데이터 상태
                isDiagOpen: false,
                syncStatus: '준비 중',
                lastSyncStr: '기록 없음',

                init() {
                    this.loadFavorites();
                    this.fetchData();

                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        this.deferredPrompt = e;
                    });
                },

                showToast(msg) {
                    if (this.toastTimeout) clearTimeout(this.toastTimeout);
                    this.toastMessage = msg;
                    this.toastShow = true;
                    this.toastTimeout = setTimeout(() => {
                        this.toastShow = false;
                    }, 2200);
                },

                loadFavorites() {
                    try {
                        const favNL = localStorage.getItem('fav_nonlife_pwa');
                        const favL = localStorage.getItem('fav_life_pwa');
                        this.favoritesNonLife = favNL ? JSON.parse(favNL) : [];
                        this.favoritesLife = favL ? JSON.parse(favL) : [];
                    } catch (e) {
                        this.favoritesNonLife = [];
                        this.favoritesLife = [];
                    }
                },

                saveFavorites() {
                    localStorage.setItem('fav_nonlife_pwa', JSON.stringify(this.favoritesNonLife));
                    localStorage.setItem('fav_life_pwa', JSON.stringify(this.favoritesLife));
                },

                isFavorite(company, category) {
                    if (category === '손보') return this.favoritesNonLife.includes(company);
                    return this.favoritesLife.includes(company);
                },

                getFavorites(category) {
                    const list = category === '손보' ? this.favoritesNonLife : this.favoritesLife;
                    return list.sort((a, b) => a.localeCompare(b, 'ko'));
                },

                getRemainingCompanies(category) {
                    const baseList = category === '손보' ? this.nonLifeCompanies : this.lifeCompanies;
                    const favList = category === '손보' ? this.favoritesNonLife : this.favoritesLife;
                    return baseList.filter(comp => !favList.includes(comp));
                },

                toggleFavorite(company, category) {
                    const favs = category === '손보' ? this.favoritesNonLife : this.favoritesLife;
                    const index = favs.indexOf(company);

                    if (index > -1) {
                        favs.splice(index, 1);
                        this.showToast(`${company} 즐겨찾기 해제`);
                    } else {
                        if (favs.length >= 4) {
                            this.showToast('즐겨찾기는 부문별로 최대 4개사까지 가능합니다.');
                            return;
                        }
                        favs.push(company);
                        this.showToast(`${company} 즐겨찾기 추가 완료`);
                    }
                    this.saveFavorites();
                },

                // 캐시 청소 후 갱신
                clearCacheAndFetch() {
                    localStorage.removeItem('cached_contacts_db');
                    localStorage.removeItem('last_sync_time');
                    this.fetchData(true);
                },

                async fetchData(userInitiated = false) {
                    this.loading = true;
                    this.syncStatus = '연결 중...';
                    
                    const sheetId = '1jE81bhIsmRv3JmJRjs-jMKMk5d6ArQDQ2ODGleLcZvY';
                    const sheetName = encodeURIComponent('보험사연락처_DB');
                    // gviz api를 호출해 JSON 타입으로 가공 후 데이터 파싱
                    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Network response not ok');
                        
                        const text = await response.text();
                        
                        // 구글 Visualization json 규격 가공
                        const jsonStart = text.indexOf("{");
                        const jsonEnd = text.lastIndexOf("}");
                        if (jsonStart === -1 || jsonEnd === -1) {
                            throw new Error("올바른 데이터 형식이 수신되지 않았습니다.");
                        }
                        
                        const jsonString = text.substring(jsonStart, jsonEnd + 1);
                        const data = JSON.parse(jsonString);

                        const cols = data.table.cols || [];
                        const rows = data.table.rows || [];

                        // 1. 필요한 열 헤더 정렬 순서 매핑
                        const targetHeaders = [
                            '손보생보구분', '보험사명', '정렬순서', '직급', '이름',
                            '전화번호1', '전화번호2', '팩스번호', '참고사항', '휴무여부',
                            '생성일시', '수정일시', '삭제일시'
                        ];
                        
                        let headerMap = {};
                        
                        // 구글 데이터 자체에서 헤더 검색 시도
                        targetHeaders.forEach(header => {
                            headerMap[header] = cols.findIndex(col => col && col.label && col.label.trim() === header);
                        });

                        // 수집된 인덱스 중 빈 곳이 있으면 rows[0] 데이터를 스캔하여 강제 인덱싱 복구
                        let isFirstRowHeader = false;
                        const missingIndex = Object.values(headerMap).some(val => val === -1);
                        
                        if (missingIndex && rows.length > 0) {
                            const firstRowCells = rows[0].c || [];
                            const scannedMap = {};
                            targetHeaders.forEach(header => {
                                scannedMap[header] = firstRowCells.findIndex(cell => {
                                    if (!cell) return false;
                                    const val = String(cell.v || cell.f || '').trim();
                                    return val === header;
                                });
                            });

                            const successCount = Object.values(scannedMap).filter(val => val !== -1).length;
                            if (successCount >= 3) {
                                headerMap = scannedMap;
                                isFirstRowHeader = true; // 첫 줄이 실제 헤더명 데이터인 경우
                            }
                        }

                        // 절대적 기본 폴백 할당
                        targetHeaders.forEach((header, idx) => {
                            if (headerMap[header] === undefined || headerMap[header] === -1) {
                                headerMap[header] = idx;
                            }
                        });

                        // 2. 데이터 가공 개시
                        const startIndex = isFirstRowHeader ? 1 : 0;
                        const parsedList = [];

                        for (let i = startIndex; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || !row.c) continue;

                            const getVal = (header) => {
                                const idx = headerMap[header];
                                if (idx === undefined || idx === -1 || idx >= row.c.length) return '';
                                const cell = row.c[idx];
                                if (!cell) return '';
                                if (cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
                                if (cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
                                return '';
                            };

                            const category = getVal('손보생보구분');
                            const company = getVal('보험사명');
                            const name = getVal('이름');

                            // 핵심 정보가 전혀 없는 비어있는 줄 제거
                            if (!category && !company && !name) continue;

                            parsedList.push({
                                category: category,
                                company: company,
                                sortOrder: getVal('정렬순서'),
                                rank: getVal('직급'),
                                name: name,
                                phone1: getVal('전화번호1'),
                                phone2: getVal('전화번호2'),
                                fax: getVal('팩스번호'),
                                note: getVal('참고사항'),
                                holiday: getVal('휴무여부') === 'Y' || getVal('휴무여부') === 'true' || getVal('휴무여부') === '휴무',
                                deleted: getVal('삭제일시')
                            });
                        }

                        // 삭제일시 값이 빈 대상만 최종 필터링 후 셋업
                        this.contacts = parsedList.filter(item => !item.deleted);
                        
                        // 정상 동기화 완료 후 브라우저 캐시에 백업
                        localStorage.setItem('cached_contacts_db', JSON.stringify(this.contacts));
                        const now = new Date();
                        localStorage.setItem('last_sync_time', now.toISOString());
                        
                        this.syncStatus = '성공';
                        this.lastSyncStr = now.toLocaleTimeString();

                        if (userInitiated) {
                            this.showToast('동기화 완료! 최신 연락처 데이터를 가져왔습니다.');
                        }
                    } catch (e) {
                        console.error("구글 시트 로딩 중 실패하여 오프라인 캐시를 탐색합니다:", e);
                        this.syncStatus = `오류 발생 (${e.message})`;
                        
                        const cached = localStorage.getItem('cached_contacts_db');
                        const lastTime = localStorage.getItem('last_sync_time');
                        if (cached) {
                            this.contacts = JSON.parse(cached);
                            this.lastSyncStr = lastTime ? new Date(lastTime).toLocaleTimeString() : '기록 없음';
                            this.showToast('네트워크 오류: 기기에 보관된 오프라인 목록을 사용합니다.');
                        } else {
                            this.showToast('데이터 조회에 실패했습니다. 공유 권한 및 연결 상태를 점검해주세요.');
                        }
                    } finally {
                        this.loading = false;
                    }
                },

                openCompanyDetails(company, category) {
                    this.selectedCompany = company;
                    this.selectedCompanyCat = category;
                    this.innerSearchQuery = '';
                },

                getGroupedCompanyContacts() {
                    if (!this.selectedCompany) return [];

                    let filtered = this.contacts.filter(c => 
                        c.company === this.selectedCompany && 
                        c.category === this.selectedCompanyCat
                    );

                    // 바텀 시트 안에서의 독립 검색 필터링
                    if (this.innerSearchQuery.trim().length > 0) {
                        const sq = this.innerSearchQuery.toLowerCase();
                        filtered = filtered.filter(c => 
                            c.name.toLowerCase().includes(sq) || 
                            (c.rank && c.rank.toLowerCase().includes(sq)) ||
                            (c.phone1 && c.phone1.includes(sq)) ||
                            (c.phone2 && c.phone2.includes(sq))
                        );
                    }

                    // 직급별 맵핑 구조 생성
                    const groupsMap = {};
                    filtered.forEach(c => {
                        const rankGroup = c.rank || '미지정';
                        if (!groupsMap[rankGroup]) {
                            groupsMap[rankGroup] = [];
                        }
                        groupsMap[rankGroup].push(c);
                    });

                    // 정렬순서 기준 정렬 (값이 같으면 가나다순 정렬)
                    const sortedGroups = Object.keys(groupsMap).map(rankName => {
                        const sortedContacts = groupsMap[rankName].sort((a, b) => {
                            const valA = parseFloat(a.sortOrder) || 99999;
                            const valB = parseFloat(b.sortOrder) || 99999;
                            if (valA !== valB) return valA - valB;
                            return a.name.localeCompare(b.name, 'ko');
                        });

                        return {
                            rank: rankName,
                            contacts: sortedContacts
                        };
                    });

                    return sortedGroups;
                },

                filteredSearchResults() {
                    const sq = this.searchQuery.trim().toLowerCase();
                    if (sq.length === 0) return [];

                    return this.contacts.filter(c => 
                        c.name.toLowerCase().includes(sq) || 
                        c.company.toLowerCase().includes(sq) || 
                        (c.rank && c.rank.toLowerCase().includes(sq)) || 
                        (c.phone1 && c.phone1.includes(sq)) || 
                        (c.phone2 && c.phone2.includes(sq)) || 
                        (c.note && c.note.toLowerCase().includes(sq))
                    ).sort((a, b) => {
                        if (a.company !== b.company) {
                            return a.company.localeCompare(b.company, 'ko');
                        }
                        const valA = parseFloat(a.sortOrder) || 99999;
                        const valB = parseFloat(b.sortOrder) || 99999;
                        if (valA !== valB) return valA - valB;
                        return a.name.localeCompare(b.name, 'ko');
                    });
                },

                // 복사 클립보드 복원력 업그레이드
                copyToClipboard(text) {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = text;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    try {
                        document.execCommand("copy");
                        this.showToast(`복사 완료: ${text}`);
                    } catch (err) {
                        this.showToast('복사에 실패했습니다.');
                    }
                    document.body.removeChild(tempInput);
                },

                async installPWA() {
                    if (this.deferredPrompt) {
                        this.deferredPrompt.prompt();
                        const { outcome } = await this.deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            this.deferredPrompt = null;
                        }
                    }
                }
            }
        }

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'insurance-pwa-v2';
                const ASSETS = [
                    './',
                    'index.html',
                    'https://cdn.tailwindcss.com',
                    'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js',
                    'https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(ASSETS).catch(err => console.log('Caching failed:', err));
                        })
                    );
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((cachedResponse) => {
                            if (cachedResponse) return cachedResponse;
                            return fetch(e.request).then((response) => {
                                if (e.request.url.includes('cdn') || e.request.url.includes('pretendard')) {
                                    return caches.open(CACHE_NAME).then((cache) => {
                                        cache.put(e.request, response.clone());
                                        return response;
                                    });
                                }
                                return response;
                            });
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL).then(() => {
                console.log('SW Registered successfully via Blob.');
            }).catch(err => {
                console.log('SW Setup Fail:', err);
            });
        }
    </script>
</body>
